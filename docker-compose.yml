services:
  gateway:
    build:
      context: ./hermes-agent
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "10000:10000"
    volumes:
      - hermes-data:/opt/data
    environment:
      - HERMES_UID=10000
      - HERMES_GID=10000
      # Allow open access for gateway (configure allowlists for production)
      - GATEWAY_ALLOW_ALL_USERS=true
      # Optional: expose API server (requires API_SERVER_KEY)
      # - API_SERVER_HOST=0.0.0.0
      # - API_SERVER_KEY=${API_SERVER_KEY}
    command: ["hermes", "gateway", "run"]

  dashboard:
    build:
      context: ./hermes-agent
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "10000:10000"
    ports:
      - "9120:9120"
    depends_on:
      - gateway
    volumes:
      - hermes-data:/opt/data
    environment:
      - HERMES_UID=10000
      - HERMES_GID=10000
      # Optional: expose API server (requires API_SERVER_KEY)
      # - API_SERVER_HOST=0.0.0.0
      # - API_SERVER_KEY=${API_SERVER_KEY}
    # Override default CMD to run dashboard web server
    # Using 'hermes' explicitly to ensure entrypoint calls hermes dashboard
    # --insecure allows binding to 0.0.0.0 for EasyPanel deployment
    command: ["hermes", "dashboard", "--host", "0.0.0.0", "--port", "9120", "--no-open", "--insecure"]

volumes:
  hermes-data:
