services:
  hermes:
    build:
      context: ./hermes-agent
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "9119"
    volumes:
      - hermes-data:/opt/data
    environment:
      - HERMES_UID=10000
      - HERMES_GID=10000
      # Optional: expose API server (requires API_SERVER_KEY)
      # - API_SERVER_HOST=0.0.0.0
      # - API_SERVER_KEY=${API_SERVER_KEY}
    # Use default ENTRYPOINT from Dockerfile which handles permissions properly
    # Entrypoint runs: /opt/hermes/docker/entrypoint.sh
    # Then passes command to hermes CLI
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9119/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  hermes-data:
